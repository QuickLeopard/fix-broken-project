name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    name: rustfmt
    steps:
    - uses: actions/checkout@v4.2.2
    - run: cargo fmt --all -- --check

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: ["", "optimized"]
    name: build (${{ matrix.features || 'slow' }})
    steps:
    - uses: actions/checkout@v4.2.2
    - uses: Swatinem/rust-cache@v2
    - name: Build
      run: cargo build --verbose --workspace ${{ matrix.features && format('--features {0}', matrix.features) || '' }}
    - name: Clippy
      id: clippy
      env:
        CARGO_TERM_COLOR: never
      run: |
        cargo clippy --workspace --all-targets ${{ matrix.features && format('--features {0}', matrix.features) || '' }} -- -D warnings 2>&1 | tee clippy.log
    - name: Run tests
      run: cargo test --verbose --workspace ${{ matrix.features && format('--features {0}', matrix.features) || '' }}
    - name: Generate test report
      if: always()
      run: |
        VARIANT="${{ matrix.features || 'slow' }}"
        echo "## 📊 CI Results (${VARIANT})" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ Build Status" >> $GITHUB_STEP_SUMMARY
        echo "Build completed successfully" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔍 Clippy Analysis" >> $GITHUB_STEP_SUMMARY
        if [ -f clippy.log ] && grep -qE "^warning:|^error:" clippy.log; then
          ISSUE_COUNT=$(grep -cE "^warning:|^error:" clippy.log || echo "0")
          echo "**Found $ISSUE_COUNT issue(s)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep -vE "^\s*(Compiling|Checking|Finished|Downloaded|Downloading|Fresh|Running|Blocking)" clippy.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        else
          echo "✨ No warnings found - code is clean!" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🧪 Tests" >> $GITHUB_STEP_SUMMARY
        echo "All tests passed ✅" >> $GITHUB_STEP_SUMMARY

  miri:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: ["", "optimized"]
    name: miri (${{ matrix.features || 'slow' }})
    steps:
    - uses: actions/checkout@v4.2.2
    - uses: Swatinem/rust-cache@v2
    - name: Install nightly + Miri
      run: |
        rustup toolchain install nightly --component miri
        rustup override set nightly
        cargo miri setup
    - name: Run Miri (unit tests)
      run: |
        cargo miri test --package broken-app --lib \
          ${{ matrix.features && format('--features {0}', matrix.features) || '' }}
    - name: Run Miri (integration tests)
      run: |
        cargo miri test --package broken-app --test integration \
          ${{ matrix.features && format('--features {0}', matrix.features) || '' }}

  valgrind:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: ["", "optimized"]
    name: valgrind (${{ matrix.features || 'slow' }})
    steps:
    - uses: actions/checkout@v4.2.2
    - uses: Swatinem/rust-cache@v2
    - name: Install Valgrind
      run: sudo apt-get update && sudo apt-get install -y valgrind
    - name: Build debug binary
      run: |
        cargo build --package broken-app --bin demo \
          ${{ matrix.features && format('--features {0}', matrix.features) || '' }}
    - name: Run Valgrind
      run: valgrind --leak-check=full --error-exitcode=1 ./target/debug/demo

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, thread]
        features: ["", "optimized"]
    name: sanitizer-${{ matrix.sanitizer }} (${{ matrix.features || 'slow' }})
    steps:
    - uses: actions/checkout@v4.2.2
    - uses: Swatinem/rust-cache@v2
    - name: Install nightly + rust-src
      run: rustup toolchain install nightly --component rust-src
    - name: Run ${{ matrix.sanitizer }} sanitizer (integration tests)
      run: |
        RUSTFLAGS="-Zsanitizer=${{ matrix.sanitizer }}" cargo +nightly test \
          -Zbuild-std \
          --target x86_64-unknown-linux-gnu \
          --package broken-app \
          --test integration \
          ${{ matrix.features && format('--features {0}', matrix.features) || '' }}
    - name: Run ${{ matrix.sanitizer }} sanitizer (demo bin)
      run: |
        RUSTFLAGS="-Zsanitizer=${{ matrix.sanitizer }}" cargo +nightly run \
          -Zbuild-std \
          --target x86_64-unknown-linux-gnu \
          --package broken-app \
          --bin demo \
          ${{ matrix.features && format('--features {0}', matrix.features) || '' }}

  profiling:
    runs-on: ubuntu-latest
    name: profiling (flamegraph + massif)
    steps:
    - uses: actions/checkout@v4.2.2
    - uses: Swatinem/rust-cache@v2
    - name: Build profiling image (Debian + linux-perf)
      run: docker build -f .github/Dockerfile.profiling -t broken-app-profiling .
    - name: Profile and benchmark (slow + optimized)
      run: |
        docker run --rm --privileged \
          -v "$GITHUB_WORKSPACE:/app" -w /app \
          broken-app-profiling \
          bash -c '
            for VARIANT in slow optimized; do
              [ "$VARIANT" = "optimized" ] && FEATURES="--features optimized" || FEATURES=""
              cargo build --release --package broken-app --bin demo $FEATURES
              cargo flamegraph --release --package broken-app --bin demo $FEATURES -o flamegraph_${VARIANT}.svg
              valgrind --tool=massif --massif-out-file=massif_${VARIANT}.out ./target/release/demo
              ms_print massif_${VARIANT}.out > massif_${VARIANT}.txt
              cargo bench --package broken-app --bench baseline $FEATURES 2>&1 | tee baseline_${VARIANT}.txt
            done
          '
    - name: Generate profiling report
      if: always()
      run: |
        echo "## Profiling Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "### Baseline Benchmarks" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Function | Slow | Optimized |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY

        for func in sum_even slow_fib slow_dedup; do
          SLOW=$(grep -m1 "${func}" baseline_slow.txt 2>/dev/null | grep -oP ':\s*\K.*' || echo "N/A")
          OPT=$(grep -m1 "${func}" baseline_optimized.txt 2>/dev/null | grep -oP ':\s*\K.*' || echo "N/A")
          echo "| \`${func}\` | ${SLOW} | ${OPT} |" >> $GITHUB_STEP_SUMMARY
        done

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Massif Heap Peak" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Variant | Peak Heap |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY

        SLOW_PEAK=$(awk 'BEGIN{max=0} /^[[:space:]]+[0-9]+[[:space:]]+[0-9]/{gsub(/,/,"",$3); v=$3+0; if(v>max) max=v} END{print (max>0)?max:"N/A"}' massif_slow.txt 2>/dev/null || echo "N/A")
        OPT_PEAK=$(awk 'BEGIN{max=0} /^[[:space:]]+[0-9]+[[:space:]]+[0-9]/{gsub(/,/,"",$3); v=$3+0; if(v>max) max=v} END{print (max>0)?max:"N/A"}' massif_optimized.txt 2>/dev/null || echo "N/A")

        if [ "$SLOW_PEAK" != "N/A" ]; then
          SLOW_KB=$((SLOW_PEAK / 1024))
          echo "| slow | ${SLOW_PEAK} B (~${SLOW_KB} KB) |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| slow | N/A |" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "$OPT_PEAK" != "N/A" ]; then
          OPT_KB=$((OPT_PEAK / 1024))
          echo "| optimized | ${OPT_PEAK} B (~${OPT_KB} KB) |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| optimized | N/A |" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Massif Top Allocations (slow)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        awk '/->[0-9]+\.[0-9]+%/{print; count++; if(count>=5) exit}' massif_slow.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no data)"
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Massif Top Allocations (optimized)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        awk '/->[0-9]+\.[0-9]+%/{print; count++; if(count>=5) exit}' massif_optimized.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no data)"
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Flamegraph" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download the SVG flamegraphs from the **Artifacts** section at the bottom of this run page. Open in a browser for interactive zoom/search." >> $GITHUB_STEP_SUMMARY
    - name: Upload profiling artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: profiling-artifacts
        path: |
          flamegraph_slow.svg
          flamegraph_optimized.svg
          massif_slow.txt
          massif_slow.out
          massif_optimized.txt
          massif_optimized.out
          baseline_slow.txt
          baseline_optimized.txt
        retention-days: 30
