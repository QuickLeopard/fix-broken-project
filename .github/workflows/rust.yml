name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose --workspace
    - name: Clippy
      id: clippy
      env:
        CARGO_TERM_COLOR: never
      run: |
        cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | tee clippy.log
        echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
      continue-on-error: true
    
    - name: Run tests
      run: cargo test --verbose --workspace
    
    - name: Generate test report
      if: always()
      run: |
        echo "## 📊 CI Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ Build Status" >> $GITHUB_STEP_SUMMARY
        echo "Build completed successfully" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔍 Clippy Analysis" >> $GITHUB_STEP_SUMMARY
        if grep -qE "^warning:|^error:" clippy.log; then
          ISSUE_COUNT=$(grep -cE "^warning:|^error:" clippy.log || echo "0")
          echo "**Found $ISSUE_COUNT issue(s)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep -vE "^\s*(Compiling|Checking|Finished|Downloaded|Downloading|Fresh|Running|Blocking)" clippy.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        else
          echo "✨ No warnings found - code is clean!" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🧪 Tests" >> $GITHUB_STEP_SUMMARY
        echo "All tests passed ✅" >> $GITHUB_STEP_SUMMARY

  miri:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install nightly + Miri
      run: |
        rustup toolchain install nightly --component miri
        rustup override set nightly
        cargo miri setup
    - name: Run Miri
      run: cargo miri test --package broken-app --test integration

  valgrind:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Valgrind
      run: sudo apt-get update && sudo apt-get install -y valgrind
    - name: Build debug binary
      run: cargo build --package broken-app --bin demo
    - name: Run Valgrind
      run: valgrind --leak-check=full --error-exitcode=1 ./target/debug/demo

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sanitizer: [address, thread]
    steps:
    - uses: actions/checkout@v4
    - name: Install nightly + rust-src
      run: rustup toolchain install nightly --component rust-src
    - name: Run ${{ matrix.sanitizer }} sanitizer
      run: |
        RUSTFLAGS="-Zsanitizer=${{ matrix.sanitizer }}" cargo +nightly test \
          -Zbuild-std \
          --target x86_64-unknown-linux-gnu \
          --package broken-app \
          --test integration
